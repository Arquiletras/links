<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forbes Bilionários 2024</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #f0d070;
    --dark: #0a0a08;
    --dark2: #111110;
    --dark3: #1a1a18;
    --text: #e8e4d8;
    --muted: #7a7060;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #0a0a08 0%, #1a160a 50%, #0a0a08 100%);
    border-bottom: 1px solid #2a2510;
    padding: 3rem 2rem 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.15) 0%, transparent 65%);
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 4rem);
    font-weight: 900;
    color: var(--gold);
    letter-spacing: -1px;
    position: relative;
  }
  header p {
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 0.5rem;
    position: relative;
  }
  .controls {
    padding: 1.5rem 2rem;
    display: flex;
    gap: 1rem;
    align-items: center;
    flex-wrap: wrap;
    background: var(--dark2);
    border-bottom: 1px solid #1e1e1a;
  }
  .controls input {
    background: var(--dark3);
    border: 1px solid #2a2a20;
    color: var(--text);
    padding: 0.6rem 1rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    border-radius: 4px;
    flex: 1;
    min-width: 200px;
    outline: none;
    transition: border-color 0.2s;
  }
  .controls input:focus { border-color: var(--gold); }
  .controls input::placeholder { color: var(--muted); }
  .count {
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 1px;
  }
  .count span { color: var(--gold); font-weight: 500; }
  .table-wrap {
    overflow-x: auto;
    padding: 1.5rem 2rem;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
  }
  thead th {
    text-align: left;
    padding: 0.6rem 1rem;
    color: var(--gold);
    font-size: 0.65rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    border-bottom: 1px solid #2a2510;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  thead th:hover { color: var(--gold-light); }
  tbody tr {
    border-bottom: 1px solid #151510;
    transition: background 0.15s;
    animation: fadeIn 0.3s ease both;
  }
  tbody tr:hover { background: var(--dark3); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  td {
    padding: 0.75rem 1rem;
    vertical-align: middle;
    white-space: nowrap;
  }
  .rank {
    color: var(--muted);
    font-size: 0.7rem;
    width: 3rem;
  }
  .rank-top { color: var(--gold); font-weight: 500; }
  .name a {
    color: var(--text);
    text-decoration: none;
    font-weight: 500;
    transition: color 0.15s;
  }
  .name a:hover { color: var(--gold-light); }
  .wealth {
    color: var(--gold);
    font-weight: 500;
    text-align: right;
  }
  .country { color: var(--muted); font-size: 0.75rem; }
  .industry { color: #8a8070; font-size: 0.72rem; }
  .btn-search {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: transparent;
    border: 1px solid #2a2510;
    color: var(--gold);
    padding: 0.3rem 0.7rem;
    border-radius: 3px;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 1px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-search:hover {
    background: var(--gold);
    color: var(--dark);
    border-color: var(--gold);
  }
  .no-results {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-size: 0.8rem;
    letter-spacing: 2px;
  }
  footer {
    text-align: center;
    padding: 2rem;
    color: var(--muted);
    font-size: 0.65rem;
    letter-spacing: 2px;
    border-top: 1px solid #151510;
  }
</style>
</head>
<body>

<header>
  <h1>Forbes Bilionários</h1>
  <p>Top 100 • Lista Mundial 2024 • Clique para pesquisar no Google</p>
</header>

<div class="controls">
  <input type="text" id="search" placeholder="Buscar por nome, país ou setor...">
  <div class="count">Mostrando <span id="count">100</span> bilionários</div>
</div>

<div class="table-wrap">
  <table id="table">
    <thead>
      <tr>
        <th>#</th>
        <th>Nome</th>
        <th style="text-align:right">Fortuna (USD)</th>
        <th>País</th>
        <th>Setor</th>
        <th>Buscar</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="no-results" id="no-results" style="display:none">Nenhum resultado encontrado.</div>
</div>

<footer>Dados baseados na lista Forbes Billionaires 2024. Valores aproximados em bilhões USD.</footer>

function googleUrl(name) {
  return `https://www.google.com/search?q=${encodeURIComponent(name + ' bilionário Forbes')}`;
}

function render(list) {
  const tbody = document.getElementById('tbody');
  const noResults = document.getElementById('no-results');
  document.getElementById('count').textContent = list.length;
  if (list.length === 0) {
    tbody.innerHTML = '';
    noResults.style.display = 'block';
    return;
  }
  noResults.style.display = 'none';
  tbody.innerHTML = list.map(([rank, name, wealth, country, industry], i) => `
    <tr style="animation-delay:${i*0.02}s">
      <td class="rank ${rank<=10?'rank-top':''}">#${rank}</td>
      <td class="name"><a href="${googleUrl(name)}" target="_blank">${name}</a></td>
      <td class="wealth">$${wealth}B</td>
      <td class="country">${country}</td>
      <td class="industry">${industry}</td>
      <td><a class="btn-search" href="${googleUrl(name)}" target="_blank">&#128269; Google</a></td>
    </tr>
  `).join('');
}

render(data);

document.getElementById('search').addEventListener('input', function() {
  const q = this.value.toLowerCase();
  render(q ? data.filter(([,name,,country,industry]) =>
    name.toLowerCase().includes(q) ||
    country.toLowerCase().includes(q) ||
    industry.toLowerCase().includes(q)
  ) : data);
});
</script>
